<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Web App UI</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --primary-color: #9d4edd;
            --bg-dark: #09090b;
            --card-bg: rgba(22, 20, 24, 0.85);
            --text-main: #ffffff;
            --text-secondary: #8b8b93;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Надежный фоновый слой */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Сначала темный цвет, затем картинка поверх */
            background-color: #111; 
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%), url('https://images.pexels.com/photos/235985/pexels-photo-235985.jpeg?auto=compress&cs=tinysrgb&w=1000');
            background-size: cover;
            background-position: center;
            z-index: -1;
            pointer-events: none;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 120px 20px;
            position: relative;
        }

        @keyframes slideInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .anim-element { animation: slideInUp 0.5s ease-out backwards; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        .header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .icon-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 8px; transition: transform 0.1s, color 0.2s; }
        .icon-btn:active { transform: scale(0.85); color: var(--text-main); }

        .profile { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
        .avatar { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255, 255, 255, 0.05); background-color: #333; }
        .profile-info h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
        
        .badge { display: inline-flex; align-items: center; gap: 6px; color: var(--primary-color); font-size: 14px; font-weight: 500; }
        .badge-icon { display: flex; align-items: center; justify-content: center; background-color: var(--primary-color); border-radius: 4px; padding: 3px; }

        .progress-section { margin-bottom: 24px; }
        .progress-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
        .progress-bar-container { display: flex; align-items: center; gap: 12px; }
        .segments { display: flex; gap: 6px; flex-grow: 1; }
        .segment { height: 8px; flex: 1; background-color: rgba(255, 255, 255, 0.15); border-radius: 4px; }
        .segment.active { background-color: var(--primary-color); box-shadow: 0 0 10px rgba(157, 78, 221, 0.5); }
        .progress-value { font-size: 18px; font-weight: 600; color: var(--primary-color); }

        .card { background-color: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 16px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.03); display: block; }
        .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .icon-circle { width: 52px; height: 52px; border-radius: 50%; background-color: rgba(157, 78, 221, 0.1); display: flex; align-items: center; justify-content: center; color: var(--primary-color); flex-shrink: 0; border: 1px solid rgba(157, 78, 221, 0.2); }
        .card-info { flex-grow: 1; }
        .card-info-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .card-info-value { font-size: 22px; font-weight: 600; }
        .card-info-value span { color: var(--primary-color); }

        .card-btn { display: flex; justify-content: center; align-items: center; width: 100%; background-color: rgba(157, 78, 221, 0.15); color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 500; cursor: pointer; position: relative; transition: background-color 0.2s, transform 0.1s; }
        .card-btn:active { background-color: rgba(157, 78, 221, 0.25); transform: scale(0.98); }
        .card-btn .chevron { position: absolute; right: 16px; color: var(--text-secondary); }
        .card-header .chevron { margin-left: auto; color: var(--text-secondary); }

        .simple-progress { height: 5px; background-color: rgba(255, 255, 255, 0.1); border-radius: 3px; margin: 20px 0 16px 0; overflow: hidden; width: 100%; }
        .simple-progress-fill { height: 100%; width: 31%; background-color: var(--primary-color); border-radius: 3px; box-shadow: 0 0 8px rgba(157, 78, 221, 0.5); animation: fillBar 1s ease-out backwards; animation-delay: 0.6s; }
        @keyframes fillBar { from { width: 0; } to { width: 31%; } }
        .card-footer { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: rgba(18, 16, 20, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + var(--safe-area-bottom)); border-top: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px 20px 0 0; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 11px; font-weight: 500; position: relative; cursor: pointer; transition: color 0.3s ease; }
        
        /* Запасной вариант анимации кнопок на чистом CSS */
        .nav-item:active { color: var(--text-main); }
        .nav-item:active svg { transform: scale(0.85); }
        
        .nav-item svg { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item.clicked svg { transform: scale(0.75); }
        
        .nav-item.active { color: var(--primary-color); }
        .nav-item::after { content: ''; position: absolute; bottom: -10px; width: 0; height: 3px; background-color: var(--primary-color); border-radius: 2px; box-shadow: 0 0 5px rgba(157, 78, 221, 0.5); transition: width 0.3s ease; }
        .nav-item.active::after { width: 24px; }
    </style>
</head>
<body ontouchstart="">

<div class="bg-layer"></div>

<div class="app-container">
    <header class="header anim-element">
        <button class="icon-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
        </button>
    </header>

    <div class="profile anim-element delay-1">
        <!-- Заменили аватарку на надежный Pravatar -->
        <img src="https://i.pravatar.cc/150?u=a04258" alt="Адам" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=Адам&background=333&color=fff'">
        <div class="profile-info">
            <h1>Адам</h1>
            <div class="badge">
                Фанат 
                <span class="badge-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="white"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></span>
            </div>
        </div>
    </div>

    <div class="progress-section anim-element delay-2">
        <div class="progress-label">Ваш прогресс</div>
        <div class="progress-bar-container">
            <div class="segments">
                <div class="segment active"></div><div class="segment active"></div><div class="segment active"></div><div class="segment active"></div>
                <div class="segment active"></div><div class="segment active"></div><div class="segment active"></div><div class="segment active"></div>
                <div class="segment"></div><div class="segment"></div>
            </div>
            <div class="progress-value">82%</div>
        </div>
    </div>

    <div class="card anim-element delay-3">
        <div class="card-header" style="margin-bottom: 0;">
            <div class="icon-circle">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M9 14h6"></path><path d="M9 10h6"></path><path d="M9 18h6"></path>
                </svg>
            </div>
            <div class="card-info">
                <div class="card-info-label">До следующего уровня:</div>
                <div class="card-info-value"><span>3</span> задания</div>
            </div>
        </div>
        <button class="card-btn" style="margin-top: 16px;">
            Задания
            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>

    <div class="card anim-element delay-4">
        <div class="card-header" style="margin-bottom: 0;">
            <div class="icon-circle">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="6" width="16" height="16" rx="2"></rect><path d="M6 2h16v16"></path><polygon points="10 14 11 11 14 11 11.5 9 12.5 6 10 8 7.5 6 8.5 9 6 11 9 11 10 14" fill="currentColor"></polygon>
                </svg>
            </div>
            <div class="card-info">
                <div class="card-info-label">Собрано карт</div>
                <div class="card-info-value"><span>17</span> <span style="color:var(--text-secondary); font-size:18px;">/ 54</span></div>
            </div>
            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
        
        <div class="simple-progress"><div class="simple-progress-fill"></div></div>
        
        <div class="card-footer">
            Продолжайте собирать коллекцию
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M2 12h20"></path><path d="m19 5-14 14"></path><path d="m5 5 14 14"></path></svg>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="javascript:void(0);" class="nav-item active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Главная
    </a>
    <a href="javascript:void(0);" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        Магазин
    </a>
    <a href="javascript:void(0);" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="16" height="16" rx="2"></rect><path d="M6 2h16v16"></path></svg>
        Коллекция
    </a>
</nav>

<script>
    // 1. БЕЗОПАСНАЯ Инициализация Telegram
    // Оборачиваем в try-catch, чтобы ошибка не убила остальные скрипты
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            try {
                tg.setHeaderColor('#000000'); 
                tg.setBackgroundColor('#000000');
            } catch (colorError) {
                console.log("Тема не поддерживается", colorError);
            }
        }
    } catch (e) {
        console.error("Ошибка Telegram API:", e);
    }

    // 2. Анимация нижней навигации (Теперь 100% сработает)
    try {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            const addClickEffect = () => item.classList.add('clicked');
            const removeClickEffect = () => {
                item.classList.remove('clicked');
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
            };

            item.addEventListener('mousedown', addClickEffect);
            item.addEventListener('touchstart', addClickEffect, { passive: true });
            item.addEventListener('mouseup', removeClickEffect);
            item.addEventListener('touchend', removeClickEffect);
            item.addEventListener('mouseleave', () => item.classList.remove('clicked'));
            item.addEventListener('touchcancel', () => item.classList.remove('clicked'));
        });
    } catch (e) {
        console.error("Ошибка анимации кнопок:", e);
    }
</script>
</body>
</html>
