<head>
    <meta charset="UTF-8">
    <!-- Расширенный meta viewport для правильного скролла в Telegram Web App -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Web App UI</title>
    
    <!-- Подключаем официальный скрипт Telegram -->

    <style>
        :root {
            --primary-color: #9d4edd;
            --bg-dark: #000000;
            --card-bg: rgba(22, 20, 24, 0.85);
            --text-main: #ffffff;
            --text-secondary: #8b8b93;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Настраиваем правильный скролл для мобилок */
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Выносим фон в отдельный слой, чтобы не ломать скролл на iPhone */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.95) 100%), url('[https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1000&auto=format&fit=crop](https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1000&auto=format&fit=crop)');
            background-size: cover;
            background-position: center;
            z-index: -1;
            pointer-events: none;
        }

        /* Контейнер приложения */
        .app-container {
            width: 100%;

            padding: 20px 20px 120px 20px; /* Увеличили нижний отступ до 120px, чтобы контент не прятался под меню */
            position: relative;

        /* --- Анимации --- */
        @keyframes slideInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .anim-element { animation: slideInUp 0.5s ease-out backwards; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* --- Шапка --- */
        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            transition: transform 0.1s, color 0.2s;

            transform: scale(0.85);

            color: var(--primary-color);

        .card-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: rgba(157, 78, 221, 0.15);
            color: #fff;
            border: none;

        .card-btn:active {

            transform: scale(0.98);
        }

        .card-btn .chevron {
            position: absolute;

            border-radius: 3px;
            margin: 20px 0 16px 0;
            overflow: hidden;
            width: 100%;
        }

        .simple-progress-fill {
            height: 100%;
            width: 31%;
            background-color: var(--primary-color);
            border-radius: 3px;
            box-shadow: 0 0 8px rgba(157, 78, 221, 0.5);
            animation: fillBar 1s ease-out backwards;
            animation-delay: 0.6s;
        }

        @keyframes fillBar {
            from { width: 0; }
            to { width: 31%; }
        }

        .card-footer {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- Нижняя навигация --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(18, 16, 20, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            /* Учитываем безопасную зону айфона (челку/полоску внизу) */
            padding: 12px 0 calc(12px + var(--safe-area-bottom));
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px 20px 0 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            position: relative;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .nav-item svg {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item.clicked svg {
            transform: scale(0.75);
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 0;
            height: 3px;
            background-color: var(--primary-color);
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(157, 78, 221, 0.5);
            transition: width 0.3s ease;
        }

        .nav-item.active::after {
            width: 24px;
        }
    </style>
</head>

<script>
    // 1. Инициализация Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем на весь экран (убирает половинчатое окно)
    tg.ready();  // Сообщаем телеграму, что приложение готово

    // Устанавливаем цвет верхней шапки Telegram в цвет нашего фона
    tg.setHeaderColor('#000000'); 
    tg.setBackgroundColor('#000000');

    // 2. Анимация нижней навигации
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        const addClickEffect = () => item.classList.add('clicked');
        const removeClickEffect = () => {
            item.classList.remove('clicked');
            navItems.forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
        };

        item.addEventListener('mousedown', addClickEffect);
        item.addEventListener('touchstart', addClickEffect, { passive: true });
        item.addEventListener('mouseup', removeClickEffect);
        item.addEventListener('touchend', removeClickEffect);
        item.addEventListener('mouseleave', () => item.classList.remove('clicked'));
        item.addEventListener('touchcancel', () => item.classList.remove('clicked'));
    });
</script>
